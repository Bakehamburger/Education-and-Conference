<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Education and Conference</title>
</head>
<body>
 <nav class="navbar navbar-dark bg-dark py-3 fixed-top custom-navbar">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand fw-bold fs-4" href="#" style="z-index: 3000;">
                <span class="text-warning">BRAND</span>
            </a>

            <!-- Desktop Nav Links & CTA -->
            <div class="navbar-nav ms-auto align-items-center desktop-nav d-none d-lg-flex">
                <a class="nav-link px-3 py-2" href="#home">Home</a>
                <a class="nav-link px-3 py-2" href="#about">About</a>
                <a class="nav-link px-3 py-2" href="#services">Services</a>
                <a class="nav-link px-3 py-2" href="#contact">Contact</a>
                <a class="btn btn-warning px-4 py-2 ms-3 rounded-pill fw-bold cta-btn" href="#">Join Now</a>
            </div>

            <!-- Burger Button - ALWAYS VISIBLE -->
            <button class="navbar-toggler border-0 burger-btn d-flex d-lg-flex" 
                    type="button" id="burgerBtn" 
                    style="z-index: 3000;" 
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Full Viewport Modal Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-header" id="closeMenu">
            <span class="text-white fs-1">&times;</span>
        </button>
        
        <div class="mobile-nav-links text-center">
            <a class="nav-link display-3 fw-bold mb-4 text-white" href="#home">HOME</a>
            <a class="nav-link display-3 fw-bold mb-4 text-white" href="#about">ABOUT</a>
            <a class="nav-link display-3 fw-bold mb-4 text-white" href="#services">SERVICES</a>
            <a class="nav-link display-3 fw-bold mb-4 text-white" href="#contact">CONTACT</a>
            <a class="btn btn-warning btn-lg px-5 py-3 rounded-pill fw-bold mobile-cta mt-5" href="#">GET STARTED</a>
        </div>
    </div>

    <!-- Page Content -->
    <div class="mt-5 pt-5" style="min-height: 200vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container py-5">
            <h1 class="display-1 text-white text-center">Desktop Burger Works! ☰</h1>
            <p class="lead text-white text-center">Try the burger on desktop - full screen modal!</p>
        </div>
    </div>

    <script src="assets/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
